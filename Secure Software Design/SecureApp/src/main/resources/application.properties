spring.application.name=SecureApp
# 1. SSL/HTTPS Server Properties
server.port=8443
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=arun123
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=springboot

# 2. Embedded H2 Database Properties
spring.datasource.url=jdbc:h2:mem:assignment_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# 3. Hibernate/JPA Settings (Auto-creates H2 tables based on Java classes)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 4. Enable the H2 Web Interface
spring.h2.console.enabled=true